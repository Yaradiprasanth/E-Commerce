<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f766e"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <linearGradient id="roof" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ecfeff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#e0f2fe" stop-opacity="0.75"/>
    </linearGradient>
  </defs>

  <rect width="600" height="400" fill="url(#bg)"/>
  <circle cx="150" cy="110" r="75" fill="#e0f2fe" opacity="0.22"/>
  <circle cx="520" cy="310" r="120" fill="#ffffff" opacity="0.08"/>

  <!-- house -->
  <g transform="translate(70,70)">
    <path d="M230 10 90 125h70v140h85v-80h40v80h85V125h70L230 10z" fill="url(#roof)" opacity="0.95"/>
    <rect x="185" y="185" width="90" height="80" rx="18" fill="#065f46" opacity="0.18"/>
    <rect x="255" y="150" width="70" height="115" rx="14" fill="#0b1220" opacity="0.12"/>
    <path d="M170 135h120" stroke="#0b1220" stroke-opacity="0.12" stroke-width="10" stroke-linecap="round"/>
  </g>

  <!-- decor -->
  <g transform="translate(390,120)">
    <rect x="0" y="0" width="160" height="210" rx="22" fill="#0b1220" opacity="0.18"/>
    <rect x="22" y="34" width="116" height="60" rx="16" fill="#ffffff" opacity="0.18"/>
    <path d="M62 130c16-18 20-38 20-60 0 22 10 42 24 60" fill="none" stroke="#ecfeff" stroke-width="10" opacity="0.45" stroke-linecap="round"/>
    <rect x="50" y="165" width="60" height="22" rx="11" fill="#f59e0b" opacity="0.25"/>
  </g>

  <text x="56" y="72" fill="#f8fafc" font-family="Segoe UI, Arial, sans-serif" font-size="40" font-weight="900">Home</text>
  <text x="56" y="106" fill="#e0f2fe" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="600" opacity="0.95">Everything for everyday living</text>
</svg>
