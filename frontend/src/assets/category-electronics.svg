<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="600" height="400" fill="url(#bg)"/>

  <!-- subtle grid -->
  <g stroke="#93c5fd" stroke-opacity="0.18" stroke-width="1">
    <path d="M0 70H600"/>
    <path d="M0 140H600"/>
    <path d="M0 210H600"/>
    <path d="M0 280H600"/>
    <path d="M0 350H600"/>
  </g>
  <g stroke="#93c5fd" stroke-opacity="0.12" stroke-width="1">
    <path d="M90 0V400"/>
    <path d="M180 0V400"/>
    <path d="M270 0V400"/>
    <path d="M360 0V400"/>
    <path d="M450 0V400"/>
    <path d="M540 0V400"/>
  </g>

  <!-- phone -->
  <g transform="translate(360,105)">
    <rect x="0" y="0" width="165" height="220" rx="22" fill="#0f172a" opacity="0.55"/>
    <rect x="16" y="18" width="133" height="184" rx="16" fill="#111827"/>
    <rect x="30" y="28" width="105" height="132" rx="12" fill="#0b1220"/>
    <rect x="72" y="170" width="21" height="10" rx="5" fill="#93c5fd" opacity="0.9"/>

    <!-- microchip -->
    <g transform="translate(10,150)" opacity="0.95">
      <rect x="0" y="0" width="145" height="45" rx="10" fill="#1e293b"/>
      <path d="M18 15H127M18 30H127" stroke="#93c5fd" stroke-width="2" stroke-linecap="round"/>
      <path d="M35 10V35M55 10V35M75 10V35M95 10V35M115 10V35" stroke="#60a5fa" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
      <circle cx="28" cy="22" r="4" fill="#f59e0b" opacity="0.95"/>
      <circle cx="118" cy="22" r="4" fill="#22d3ee" opacity="0.95"/>
    </g>
  </g>

  <!-- lightning accent -->
  <path d="M180 285l55-105h-55l40-75-110 160h60l-20 90z" fill="#f59e0b" opacity="0.28"/>
  <path d="M170 275l55-105h-55l40-75-110 160h60l-20 90z" fill="#f59e0b" opacity="0.18"/>

  <rect x="70" y="40" width="480" height="320" rx="28" fill="url(#shine)"/>

  <text x="38" y="62" fill="#f8fafc" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="800">Electronics</text>
  <text x="38" y="98" fill="#e0f2fe" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="600" opacity="0.9">Smart picks, premium performance</text>
</svg>
